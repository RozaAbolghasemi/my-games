<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Shooter</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { display: block; border: 1px solid #222; }
  #overlay { position: absolute; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; pointer-events: none; }
  #overlay.clickable { pointer-events: auto; cursor: pointer; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="overlay"></div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const W = canvas.width = 600;
const H = canvas.height = 800;

let player, bullets, enemies, particles, stars, score, lives, wave, spawnTimer, gameState, keys;

function init() {
  player = { x: W / 2, y: H - 80, w: 40, h: 40, speed: 5, shootCooldown: 0 };
  bullets = [];
  enemies = [];
  particles = [];
  score = 0;
  lives = 3;
  wave = 1;
  spawnTimer = 0;
  keys = {};
  gameState = 'playing';
  if (!stars) {
    stars = [];
    for (let i = 0; i < 120; i++) {
      stars.push({ x: Math.random() * W, y: Math.random() * H, s: Math.random() * 2 + 0.5, speed: Math.random() * 1.5 + 0.5 });
    }
  }
}

function showScreen(title, sub) {
  overlay.innerHTML = `<h1 style="font-size:3rem;margin-bottom:10px">${title}</h1><p style="font-size:1.2rem;color:#aaa">${sub}</p>`;
  overlay.style.top = '50%';
  overlay.style.left = '50%';
  overlay.style.transform = 'translate(-50%,-50%)';
  overlay.className = 'clickable';
}

function spawnEnemy() {
  const type = Math.random() < 0.15 + wave * 0.02 ? 'fast' : Math.random() < 0.1 + wave * 0.01 ? 'big' : 'normal';
  const e = {
    x: Math.random() * (W - 40) + 20,
    y: -40,
    w: type === 'big' ? 50 : 30,
    h: type === 'big' ? 50 : 30,
    speed: type === 'fast' ? 3.5 + wave * 0.3 : type === 'big' ? 1 + wave * 0.1 : 1.5 + wave * 0.2,
    hp: type === 'big' ? 3 : 1,
    type,
    shootTimer: Math.random() * 120 + 60,
    angle: 0
  };
  enemies.push(e);
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 30 + Math.random() * 20, color, size: Math.random() * 3 + 1 });
  }
}

function collides(a, b) {
  return a.x - a.w / 2 < b.x + b.w / 2 && a.x + a.w / 2 > b.x - b.w / 2 && a.y - a.h / 2 < b.y + b.h / 2 && a.y + a.h / 2 > b.y - b.h / 2;
}

function update() {
  // Stars
  stars.forEach(s => { s.y += s.speed; if (s.y > H) { s.y = 0; s.x = Math.random() * W; } });

  if (gameState !== 'playing') return;

  // Player movement
  if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
  if (keys['ArrowRight'] || keys['d']) player.x += player.speed;
  if (keys['ArrowUp'] || keys['w']) player.y -= player.speed;
  if (keys['ArrowDown'] || keys['s']) player.y += player.speed;
  player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));
  player.y = Math.max(player.h / 2, Math.min(H - player.h / 2, player.y));

  // Shooting
  if (player.shootCooldown > 0) player.shootCooldown--;
  if ((keys[' '] || keys['Space']) && player.shootCooldown <= 0) {
    bullets.push({ x: player.x - 10, y: player.y - 20, vy: -8, friendly: true, w: 4, h: 12 });
    bullets.push({ x: player.x + 10, y: player.y - 20, vy: -8, friendly: true, w: 4, h: 12 });
    player.shootCooldown = 10;
  }

  // Spawn enemies
  spawnTimer--;
  if (spawnTimer <= 0) {
    spawnEnemy();
    spawnTimer = Math.max(20, 60 - wave * 5);
  }

  // Update enemies
  enemies.forEach(e => {
    e.y += e.speed;
    e.angle += 0.05;
    e.shootTimer--;
    if (e.shootTimer <= 0 && e.y > 50 && e.y < H / 2) {
      bullets.push({ x: e.x, y: e.y + e.h / 2, vy: 4 + wave * 0.3, friendly: false, w: 6, h: 6 });
      e.shootTimer = 80 + Math.random() * 60;
    }
  });

  // Update bullets
  bullets.forEach(b => b.y += b.vy);
  bullets = bullets.filter(b => b.y > -20 && b.y < H + 20);

  // Bullet-enemy collisions
  bullets = bullets.filter(b => {
    if (!b.friendly) return true;
    for (let i = enemies.length - 1; i >= 0; i--) {
      if (collides(b, enemies[i])) {
        enemies[i].hp--;
        if (enemies[i].hp <= 0) {
          const pts = enemies[i].type === 'big' ? 30 : enemies[i].type === 'fast' ? 20 : 10;
          score += pts;
          spawnParticles(enemies[i].x, enemies[i].y, enemies[i].type === 'fast' ? '#ff6' : enemies[i].type === 'big' ? '#f84' : '#4f8', 15);
          enemies.splice(i, 1);
          if (score > 0 && score % 200 === 0) wave++;
        } else {
          spawnParticles(b.x, b.y, '#fff', 3);
        }
        return false;
      }
    }
    return true;
  });

  // Enemy bullets hitting player
  bullets = bullets.filter(b => {
    if (b.friendly) return true;
    if (collides(b, player)) {
      lives--;
      spawnParticles(player.x, player.y, '#e94560', 20);
      if (lives <= 0) {
        gameState = 'gameover';
        showScreen('GAME OVER', `Score: ${score}<br>Click to restart`);
      }
      return false;
    }
    return true;
  });

  // Enemy-player collision
  enemies = enemies.filter(e => {
    if (e.y > H + 50) return false;
    if (collides(e, player)) {
      lives--;
      spawnParticles(e.x, e.y, '#e94560', 20);
      if (lives <= 0) {
        gameState = 'gameover';
        showScreen('GAME OVER', `Score: ${score}<br>Click to restart`);
      }
      return false;
    }
    return true;
  });

  // Update particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; });
  particles = particles.filter(p => p.life > 0);
}

function draw() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    ctx.fillStyle = `rgba(255,255,255,${s.s / 2.5})`;
    ctx.fillRect(s.x, s.y, s.s, s.s);
  });

  if (gameState === 'playing') {
    // Player ship
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.fillStyle = '#53d8fb';
    ctx.beginPath();
    ctx.moveTo(0, -22);
    ctx.lineTo(-18, 18);
    ctx.lineTo(-8, 12);
    ctx.lineTo(0, 16);
    ctx.lineTo(8, 12);
    ctx.lineTo(18, 18);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#2af';
    ctx.beginPath();
    ctx.moveTo(0, -14);
    ctx.lineTo(-8, 10);
    ctx.lineTo(0, 6);
    ctx.lineTo(8, 10);
    ctx.closePath();
    ctx.fill();
    // Engine glow
    ctx.fillStyle = `rgba(83,216,251,${0.3 + Math.random() * 0.3})`;
    ctx.beginPath();
    ctx.moveTo(-6, 16);
    ctx.lineTo(0, 28 + Math.random() * 8);
    ctx.lineTo(6, 16);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // Enemies
    enemies.forEach(e => {
      ctx.save();
      ctx.translate(e.x, e.y);
      if (e.type === 'fast') {
        ctx.fillStyle = '#ffe234';
        ctx.beginPath();
        ctx.moveTo(0, -15);
        ctx.lineTo(-12, 15);
        ctx.lineTo(12, 15);
        ctx.closePath();
        ctx.fill();
      } else if (e.type === 'big') {
        ctx.fillStyle = '#ff6534';
        ctx.rotate(e.angle);
        ctx.fillRect(-25, -25, 50, 50);
        ctx.fillStyle = '#c44';
        ctx.fillRect(-15, -15, 30, 30);
      } else {
        ctx.fillStyle = '#4f8';
        ctx.beginPath();
        ctx.arc(0, 0, 15, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#2a5';
        ctx.beginPath();
        ctx.arc(0, 0, 8, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    });
  }

  // Bullets
  bullets.forEach(b => {
    if (b.friendly) {
      ctx.fillStyle = '#53d8fb';
      ctx.shadowColor = '#53d8fb';
      ctx.shadowBlur = 8;
      ctx.fillRect(b.x - 2, b.y - 6, 4, 12);
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = '#e94560';
      ctx.shadowColor = '#e94560';
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  });

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 50;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  });
  ctx.globalAlpha = 1;

  // HUD
  ctx.fillStyle = '#fff';
  ctx.font = '18px Segoe UI, sans-serif';
  ctx.fillText(`Score: ${score}`, 15, 30);
  ctx.fillText(`Wave: ${wave}`, 15, 55);
  ctx.fillStyle = '#e94560';
  for (let i = 0; i < lives; i++) {
    ctx.fillText('\u2665', W - 30 * (i + 1), 30);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') e.preventDefault();
});
document.addEventListener('keyup', e => keys[e.key] = false);

overlay.addEventListener('click', () => {
  if (gameState === 'start' || gameState === 'gameover') {
    overlay.innerHTML = '';
    overlay.className = '';
    init();
  }
});

// Start screen
stars = null;
init();
gameState = 'start';
showScreen('SPACE SHOOTER', 'Arrow keys / WASD to move<br>Space to shoot<br><br>Click to start');
loop();
</script>
</body>
</html>
